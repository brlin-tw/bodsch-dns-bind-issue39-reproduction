// Minimal BIND configuration for reproducing the
// "journal out of sync with zone" dynamic-zone load failure.
//
// Self-contained: one dynamic primary zone, everything under /work, logging
// to a file we can read back.  Deliberately NOT derived from the project's
// inventory/playbooks.
//
// Copyright 2026 Buo-ren Lin (OSSII) <buoren.lin@ossii.com.tw>
// SPDX-License-Identifier: AGPL-3.0-or-later

include "/etc/bind/rndc.key";

controls {
    inet 127.0.0.1 port 953 allow { 127.0.0.1; } keys { "rndc-key"; };
};

options {
    directory "/work";
    pid-file "/work/named.pid";
    session-keyfile "/work/session.key";

    listen-on port 53 { 127.0.0.1; };
    listen-on-v6 { none; };

    recursion no;
    dnssec-validation no;
    notify no;
};

logging {
    channel repro_log {
        file "/work/named.log";
        severity dynamic;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    // Capture every category (including zone-load errors) into one file.
    category default { repro_log; };
};

// The dynamic zone.  `allow-update { any; }` keeps the testcase key-free;
// in production this is `allow-update { key "primary-ddns-hosts"; }`.
zone "repro.test" {
    type primary;
    file "/work/repro.test.zone";
    allow-update { any; };
};
